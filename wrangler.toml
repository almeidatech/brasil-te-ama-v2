name = "brasil-te-ama-v2"
type = "javascript"
compatibility_date = "2024-04-19"

[env.production]
name = "brasil-te-ama-v2"

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.{jsx,js,css}"]

[build.upload]
format = "service-worker"

[env.production.routes]
pattern = "brasil-te-ama-v2.pages.dev"
zone_name = "pages.dev"
